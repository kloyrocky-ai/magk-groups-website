<style>
  :root{
    --black:#0A0A0A;--dark:#111118;--dark2:#16161F;--mid:#1E1E2A;
    --gold:#C9A84C;--gold2:#E8C97A;
    --white:#F5F2EC;--muted:#8A8A9A;
    --border:rgba(201,168,76,0.2);--border2:rgba(255,255,255,0.06);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{height:100%;}
  body{
    font-family:'Outfit',sans-serif;
    background:var(--dark);
    color:var(--white);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* Background */
  .bg{
    position:fixed;inset:0;
    background:
      radial-gradient(ellipse 60% 60% at 50% 40%,rgba(201,168,76,0.05) 0%,transparent 60%),
      linear-gradient(180deg,#0A0A0F 0%,#111118 100%);
  }
  .bg-grid{
    position:fixed;inset:0;opacity:0.03;
    background-image:
      linear-gradient(var(--gold) 1px,transparent 1px),
      linear-gradient(90deg,var(--gold) 1px,transparent 1px);
    background-size:80px 80px;
  }
  body::before{
    content:'';position:fixed;inset:0;z-index:0;opacity:0.03;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events:none;
  }

  /* Nav */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 6%;
    background:rgba(10,10,10,0.6);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border2);
  }
  .nav-logo{
    font-family:'Bebas Neue',sans-serif;font-size:1.6rem;
    letter-spacing:0.12em;color:var(--white);text-decoration:none;
    display:flex;align-items:center;gap:10px;
  }
  .nav-logo span{color:var(--gold);}
  .logo-dot{
    width:6px;height:6px;background:var(--gold);
    border-radius:50%;display:inline-block;
    animation:pulse 2s infinite;
  }

  /* Main Content */
  .container{
    position:relative;z-index:1;
    text-align:center;
    padding:24px;
    max-width:600px;
    width:100%;
  }

  .error-code{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(7rem,20vw,14rem);
    font-weight:300;
    line-height:0.9;
    color:transparent;
    -webkit-text-stroke:1px rgba(201,168,76,0.3);
    letter-spacing:-0.04em;
    display:block;
    margin-bottom:8px;
    animation:fadeUp 0.8s ease 0.2s both;
    user-select:none;
  }

  .error-line{
    width:60px;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    margin:0 auto 28px;
    animation:fadeUp 0.8s ease 0.4s both;
  }

  .error-title{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(1.6rem,4vw,2.5rem);
    font-weight:300;
    color:var(--white);
    line-height:1.2;
    margin-bottom:16px;
    animation:fadeUp 0.8s ease 0.5s both;
  }
  .error-title em{font-style:italic;color:var(--gold);}

  .error-sub{
    font-size:0.92rem;
    font-weight:300;
    color:var(--muted);
    line-height:1.8;
    margin-bottom:40px;
    animation:fadeUp 0.8s ease 0.6s both;
  }

  .error-actions{
    display:flex;align-items:center;justify-content:center;
    gap:16px;flex-wrap:wrap;
    animation:fadeUp 0.8s ease 0.7s both;
  }

  .btn-primary{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--gold);color:var(--black);
    font-size:0.8rem;font-weight:700;letter-spacing:0.12em;
    text-transform:uppercase;padding:14px 32px;
    text-decoration:none;border-radius:2px;
    transition:all 0.3s;
  }
  .btn-primary:hover{
    background:var(--gold2);
    transform:translateY(-2px);
    box-shadow:0 12px 40px rgba(201,168,76,0.3);
  }

  .btn-ghost{
    display:inline-flex;align-items:center;gap:10px;
    color:var(--white);font-size:0.8rem;font-weight:500;
    letter-spacing:0.1em;text-transform:uppercase;
    text-decoration:none;padding:14px 24px;
    border:1px solid var(--border2);border-radius:2px;
    transition:all 0.3s;
  }
  .btn-ghost:hover{border-color:var(--border);color:var(--gold);}

  /* Quick links */
  .quick-links{
    margin-top:48px;
    display:flex;align-items:center;justify-content:center;
    gap:8px;flex-wrap:wrap;
    animation:fadeUp 0.8s ease 0.85s both;
  }
  .quick-label{
    font-size:0.7rem;font-weight:600;letter-spacing:0.15em;
    text-transform:uppercase;color:var(--muted);
  }
  .quick-link{
    font-size:0.75rem;font-weight:500;
    color:var(--muted);text-decoration:none;
    padding:6px 14px;border:1px solid var(--border2);
    border-radius:2px;transition:all 0.3s;
    letter-spacing:0.05em;
  }
  .quick-link:hover{border-color:var(--border);color:var(--gold);}

  /* WhatsApp float */
  .wa-float{
    position:fixed;bottom:28px;right:28px;z-index:999;
    display:flex;align-items:center;gap:12px;cursor:pointer;
  }
  .wa-btn{
    width:54px;height:54px;background:#25D366;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 24px rgba(37,211,102,0.4);
    transition:all 0.3s;position:relative;
  }
  .wa-btn::before{
    content:'';position:absolute;inset:-4px;border-radius:50%;
    border:2px solid rgba(37,211,102,0.3);
    animation:waPulse 2s ease infinite;
  }
  .wa-btn:hover{transform:scale(1.08);}
  .wa-btn svg{width:28px;height:28px;fill:white;}

  /* Animations */
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(24px);}
    to{opacity:1;transform:translateY(0);}
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:0.5;transform:scale(0.7);}
  }
  @keyframes waPulse{
    0%{transform:scale(1);opacity:1;}
    100%{transform:scale(1.4);opacity:0;}
  }

  @media(max-width:480px){
    .error-actions{flex-direction:column;align-items:stretch;}
    .btn-primary,.btn-ghost{justify-content:center;}
    .wa-float{bottom:20px;right:20px;}
  }
</style>
